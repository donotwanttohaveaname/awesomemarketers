name: Sync Luma Events

on:
  schedule:
    - cron: '0 6 * * *'  # Runs daily at 6:00 UTC (8:00 Helsinki)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync Luma events
        run: python .github/scripts/sync_luma_events.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add events/index.html && git commit -m "Auto-sync Luma events $(date +%Y-%m-%d)" && git push)
